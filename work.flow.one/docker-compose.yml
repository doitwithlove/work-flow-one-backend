services:
  mongodb:
    image: mongo:7.0
    container_name: workflowone-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: workflowone
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    container_name: workflowone-backend
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/workflowone
      JWT_SECRET: ${JWT_SECRET:-8VvN9W5cZ2LqY7XrM3Kp6Hs8Fd1Jn4Ba9Qw7Rt2Uv5Ex9Lm2Nd4Cb}

volumes:
  mongodb-data:
